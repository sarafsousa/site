<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #F4B8D1;
        }

        html,
        body {
            overflow: hidden;
        }

        .mockup {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-image: url("assets/Artboard 1.svg");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .center-text {
            position: absolute;
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;

            font-family: "Edu NSW ACT Cursive", cursive;
            color: #e0007a;
            font-size: 50px;
            line-height: 1.3;
        }

        .name {
            top: 75%;
            font-family: "Poppins", sans-serif;
            font-size: 20px;
            color: #231F20;
        }

        .phone-time {
            position: absolute;

            top: 49%;
            right: 22%;

            font-family: "Poppins", sans-serif;
            font-size: 30px;
            color: white;

            transform: rotate(-28deg);
        }
    </style>
</head>

<body>

    <audio id="audio" loop>
        <source src="assets/song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>


    <div class="mockup">
        <div id="typewriter" class="center-text">
            music-fueled-designer-<br>
            blending-illustration-and-<br>
            web-design-experiences
        </div>
        <div class="center-text name">Sara Sousa</div>

        <div id="clock" class="phone-time">12:16</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date()

            const hours = now.getHours().toString().padStart(2, "0")
            const minutes = now.getMinutes().toString().padStart(2, "0")

            document.getElementById("clock").textContent = `${hours}:${minutes}`
        }

        updateClock()
        setInterval(updateClock, 1000)


        new Typewriter('#typewriter', {
            strings: "music-fueled-designer-<br>blending-illustration-and-<br>web-design-experiences",
            autoStart: true,
            cursor: "",
            loop: true,
            pauseFor: 2000
        });


        window.addEventListener("load", () => {
            document.body.addEventListener("click", () => {
                audio.play()
            }, { once: true })
        })
    </script>

</body>

</html>
